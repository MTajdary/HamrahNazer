<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>همراه ناظر (نسخه نهایی)</title>
    
    <!-- PWA Manifest and Theme Color -->
    <meta name="theme-color" content="#FFD700">
    <link rel="manifest" href="manifest.json">
    <!-- Apple-specific meta tags for PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="همراه ناظر">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap');
        :root {
            --background: #f9fafb;
            --foreground: #111827;
            --card-background: #ffffff;
            --card-foreground: #111827;
            --border-color: #e5e7eb;
            --primary: #2563eb;
            --primary-foreground: #ffffff;
            --primary-hover: #1d4ed8;
        }
        html.paper {
            --background: #fdf6e3;
            --foreground: #654f34;
            --card-background: #fbf1d7;
            --card-foreground: #654f34;
            --border-color: #d3c7a8;
        }
        html.blueprint {
            --background: #e0e8f9;
            --foreground: #0d3b66;
            --card-background: #f0f5ff;
            --card-foreground: #0d3b66;
            --border-color: #b0c4de;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #e5e7eb; /* A neutral background for the page */
            color: var(--foreground);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        #app-container {
            width: 100%;
            max-width: 420px; /* Simulates a mobile screen width */
            height: 100vh; /* Full viewport height */
            max-height: 900px; /* Max height for larger screens */
            background-color: var(--background);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .themed-card { background-color: var(--card-background); color: var(--card-foreground); border-color: var(--border-color); }
        .themed-header { background-color: var(--card-background); border-color: var(--border-color); }
        .themed-modal-content { background-color: var(--card-background); }
        .themed-button { background-color: var(--primary); color: var(--primary-foreground); }
        .themed-button:hover { background-color: var(--primary-hover); }

        .loader { border-top-color: var(--primary); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        input[type="file"] { display: none; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            padding: 1rem; border-radius: 0.5rem; width: 95%;
            max-width: 600px; max-height: 90vh; display: flex; flex-direction: column;
        }
        #pdf-render-area {
            position: absolute;
            left: -9999px;
            top: 0;
            background: white;
            font-family: 'Vazirmatn', sans-serif;
            direction: rtl;
            width: 800px; /* Width for image receipt */
            padding: 20px;
            word-wrap: break-word; /* Ensure text wraps to prevent overflow */
        }
        .photo-editor-canvas {
            max-width: 100%;
            max-height: 60vh;
            object-fit: contain;
            cursor: crosshair;
        }
        .layout-comfortable .project-card { padding: 1rem; margin-bottom: 1rem; }
        .layout-compact .project-card { padding: 0.75rem; margin-bottom: 0.75rem; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="root" class="h-full"></div>
    </div>
    <div id="pdf-render-area"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { console.log(error); return initialValue; }
            });
            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) { console.log(error); }
            };
            return [storedValue, setValue];
        };
        
        const initialProjects = [
          { id: 1, name: 'برج مسکونی آفتاب', address: 'تهران، خیابان ولیعصر', status: 'در حال اجرا', progress: 75, lat: 35.72, lon: 51.42 },
          { id: 2, name: 'مجتمع تجاری نگین', address: 'اصفهان، میدان نقش جهان', status: 'متوقف', progress: 30, lat: 32.65, lon: 51.67 },
        ];
        const initialProfile = { 
            name: 'نام شما', 
            engId: '۱۲۳۴۵۶۷۸۹۰', 
            companyName: 'شرکت شما',
            contactNumber: '۰۹۱۲۰۰۰۰۰۰۰',
            signature: null, 
            companyLogo: null, 
            showPdfFooter: true,
            pdfHeaderTitle: 'گزارش بازدید از پروژه',
            accentColor: '#2563eb',
            layoutDensity: 'comfortable'
        };
        const initialReports = {};

        // --- Generic Gemini API Caller ---
        const callGeminiAPI = async (payload) => {
            const apiKey = ""; // This will be injected by the environment
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;
            
            let response;
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        const result = await response.json();
                        if (result.candidates && result.candidates[0]?.content?.parts[0]?.text) {
                            return result.candidates[0].content.parts[0].text;
                        } else {
                            throw new Error("پاسخ نامعتبر از سرویس هوش مصنوعی دریافت شد.");
                        }
                    } else if (response.status === 429 || response.status >= 500) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    } else {
                        throw new Error(`خطای شبکه: ${response.status}`);
                    }
                } catch (error) {
                    if (i === 4) { throw error; }
                }
            }
            throw new Error("خطا در برقراری ارتباط با سرویس هوش مصنوعی پس از چندین تلاش.");
        };
        
        const ProjectCard = ({ project, onSelect, onEdit, onDelete }) => (
            <div className="themed-card rounded-xl mb-4 shadow-md border project-card">
                <div onClick={() => onSelect(project)} className="cursor-pointer">
                    <div className="flex justify-between items-center mb-2">
                        <h3 className="text-lg font-bold">{project.name}</h3>
                        <div className={`px-3 py-1 rounded-full text-xs font-semibold text-white ${project.status === 'در حال اجرا' ? 'bg-blue-500' : project.status === 'متوقف' ? 'bg-red-500' : 'bg-green-500'}`}>{project.status}</div>
                    </div>
                    <div className="flex items-center mb-4 opacity-70 text-sm">
                       <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                       <span className="mr-2">{project.address}</span>
                    </div>
                    <div>
                        <div className="flex justify-between mb-1 text-xs"><span className="opacity-70">پیشرفت پروژه</span><span className="font-bold" style={{color: 'var(--primary)'}}>{project.progress}%</span></div>
                        <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5"><div className="h-2.5 rounded-full" style={{ width: `${project.progress}%`, backgroundColor: 'var(--primary)' }}></div></div>
                    </div>
                </div>
                <div className="flex justify-end items-center mt-4 pt-2 border-t" style={{borderColor: 'var(--border-color)'}}>
                    <button onClick={(e) => { e.stopPropagation(); onEdit(project); }} className="p-2 opacity-60 hover:opacity-100 hover:text-blue-600"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button onClick={(e) => { e.stopPropagation(); onDelete(project.id); }} className="p-2 opacity-60 hover:opacity-100 hover:text-red-600"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
                </div>
            </div>
        );

        const ProjectFormModal = ({ project, onSave, onCancel }) => {
            const [formData, setFormData] = useState(project || { name: '', address: '', lat: '', lon: '', status: 'در حال اجرا', progress: 0 });
            const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleSubmit = (e) => { e.preventDefault(); onSave(formData); };
            return (
                <div className="modal-overlay">
                    <div className="modal-content themed-modal-content">
                        <h2 className="text-xl font-bold mb-4">{project ? 'ویرایش پروژه' : 'افزودن پروژه جدید'}</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="text" name="name" value={formData.name} onChange={handleChange} placeholder="نام پروژه" className="w-full p-2 border rounded bg-transparent" required />
                            <input type="text" name="address" value={formData.address} onChange={handleChange} placeholder="آدرس" className="w-full p-2 border rounded bg-transparent" required />
                            <div className="flex space-x-2 space-x-reverse">
                                <input type="number" step="any" name="lat" value={formData.lat} onChange={handleChange} placeholder="عرض جغرافیایی" className="w-1/2 p-2 border rounded bg-transparent" />
                                <input type="number" step="any" name="lon" value={formData.lon} onChange={handleChange} placeholder="طول جغرافیایی" className="w-1/2 p-2 border rounded bg-transparent" />
                            </div>
                            <div className="flex items-center space-x-4 space-x-reverse">
                                <label className="w-1/4">وضعیت:</label>
                                <select name="status" value={formData.status} onChange={handleChange} className="w-3/4 p-2 border rounded bg-transparent">
                                    <option value="در حال اجرا">در حال اجرا</option><option value="متوقف">متوقف</option><option value="پایان یافته">پایان یافته</option>
                                </select>
                            </div>
                             <div className="flex items-center space-x-4 space-x-reverse">
                                <label className="w-1/4">پیشرفت:</label>
                                <input type="range" name="progress" min="0" max="100" value={formData.progress} onChange={handleChange} className="w-3/4" /><span>{formData.progress}%</span>
                            </div>
                            <div className="flex justify-end space-x-2 space-x-reverse pt-4">
                                <button type="button" onClick={onCancel} className="bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded">انصراف</button>
                                <button type="submit" className="themed-button px-4 py-2 rounded">ذخیره</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };
        
        const ProfileScreen = ({ profile, setProfile, onBack, theme, setTheme }) => {
            const [formData, setFormData] = useState(profile);
            const accentColors = [
                { name: 'Blue', value: '#2563eb', hover: '#1d4ed8' },
                { name: 'Green', value: '#16a34a', hover: '#15803d' },
                { name: 'Orange', value: '#f97316', hover: '#ea580c' },
                { name: 'Purple', value: '#9333ea', hover: '#7e22ce' },
            ];

            const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleFileUpload = (e, field) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFormData(prev => ({ ...prev, [field]: reader.result }));
                    reader.readAsDataURL(file);
                }
            };
            const handleSave = () => { setProfile(formData); onBack(); };
            return (
                <div className="flex flex-col h-screen">
                    <header className="themed-header flex justify-between items-center p-4 border-b"><button onClick={onBack} className="p-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button><h1 className="text-xl font-bold">پروفایل و تنظیمات</h1><div style={{width: 24}}></div></header>
                    <main className="p-4 space-y-6 overflow-y-auto">
                        <div>
                            <h3 className="font-bold mb-2">مشخصات فردی</h3>
                            <div className="space-y-3">
                                <input type="text" name="name" value={formData.name} onChange={handleChange} placeholder="نام و نام خانوادگی" className="w-full p-2 border rounded bg-transparent" />
                                <input type="text" name="engId" value={formData.engId} onChange={handleChange} placeholder="شماره نظام مهندسی" className="w-full p-2 border rounded bg-transparent" />
                                <input type="text" name="companyName" value={formData.companyName} onChange={handleChange} placeholder="نام شرکت" className="w-full p-2 border rounded bg-transparent" />
                                <input type="text" name="contactNumber" value={formData.contactNumber} onChange={handleChange} placeholder="شماره تماس" className="w-full p-2 border rounded bg-transparent" />
                            </div>
                        </div>
                        
                        <div>
                            <h3 className="font-bold mb-2">شخصی‌سازی گزارش</h3>
                            <div className="grid grid-cols-2 gap-2">
                                <div>
                                    <label htmlFor="signature-upload" className="w-full bg-gray-200 dark:bg-gray-700 p-3 rounded-lg flex flex-col justify-center items-center font-bold cursor-pointer h-24">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                                        <span className="mt-1 text-sm">آپلود امضا</span>
                                    </label>
                                    <input id="signature-upload" type="file" accept="image/*" onChange={(e) => handleFileUpload(e, 'signature')} />
                                    {formData.signature && <img src={formData.signature} alt="Signature" className="mx-auto my-2 max-h-16 border p-1" />}
                                </div>
                                <div>
                                    <label htmlFor="logo-upload" className="w-full bg-gray-200 dark:bg-gray-700 p-3 rounded-lg flex flex-col justify-center items-center font-bold cursor-pointer h-24">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                        <span className="mt-1 text-sm">آپلود لوگو</span>
                                    </label>
                                    <input id="logo-upload" type="file" accept="image/*" onChange={(e) => handleFileUpload(e, 'companyLogo')} />
                                    {formData.companyLogo && <img src={formData.companyLogo} alt="Company Logo" className="mx-auto my-2 max-h-16 border p-1" />}
                                </div>
                            </div>
                        </div>

                        <div>
                            <h3 className="font-bold mb-2">تنظیمات PDF</h3>
                             <input type="text" name="pdfHeaderTitle" value={formData.pdfHeaderTitle} onChange={handleChange} placeholder="عنوان سربرگ PDF" className="w-full p-2 border rounded bg-transparent mb-3" />
                            <div className="flex justify-between items-center themed-card p-3 rounded-lg border">
                                <span className="text-sm">نمایش پاورقی "تهیه شده توسط همراه ناظر"</span>
                                <button
                                    onClick={() => setFormData(prev => ({ ...prev, showPdfFooter: !prev.showPdfFooter }))}
                                    className={`w-12 h-6 rounded-full p-1 transition-colors ${formData.showPdfFooter ? 'themed-button' : 'bg-gray-300'}`}
                                >
                                    <span className={`block w-4 h-4 bg-white rounded-full shadow-md transform transition-transform ${formData.showPdfFooter ? 'translate-x-6' : 'translate-x-0'}`}></span>
                                </button>
                            </div>
                        </div>
                        
                        <div>
                             <h3 className="font-bold mb-2">شخصی‌سازی ظاهر</h3>
                             <div className="themed-card p-3 rounded-lg border space-y-4">
                                <div>
                                    <label className="text-sm font-bold mb-2 block">تم برنامه</label>
                                    <div className="grid grid-cols-3 gap-2 text-sm">
                                        {['light', 'paper', 'blueprint'].map(t => (
                                            <button key={t} onClick={() => setTheme(t)} className={`p-2 rounded border-2 capitalize ${theme === t ? 'border-blue-500' : 'border-transparent'}`}>{t}</button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-sm font-bold mb-2 block">رنگ اصلی</label>
                                    <div className="flex justify-around">
                                        {accentColors.map(color => (
                                            <button key={color.name} onClick={() => setFormData(prev => ({ ...prev, accentColor: color.value }))}
                                                className={`w-8 h-8 rounded-full border-2 ${formData.accentColor === color.value ? 'border-white' : 'border-transparent'}`}
                                                style={{ backgroundColor: color.value }}
                                            ></button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-sm font-bold mb-2 block">چیدمان</label>
                                     <div className="flex rounded-md shadow-sm">
                                        <button onClick={() => setFormData(prev => ({...prev, layoutDensity: 'comfortable'}))} className={`px-4 py-2 text-sm font-medium rounded-r-md flex-1 ${formData.layoutDensity === 'comfortable' ? 'themed-button' : 'bg-gray-200 dark:bg-gray-700'}`}>راحت</button>
                                        <button onClick={() => setFormData(prev => ({...prev, layoutDensity: 'compact'}))} className={`px-4 py-2 text-sm font-medium rounded-l-md flex-1 ${formData.layoutDensity === 'compact' ? 'themed-button' : 'bg-gray-200 dark:bg-gray-700'}`}>فشرده</button>
                                    </div>
                                </div>
                             </div>
                        </div>

                        <button onClick={handleSave} className="w-full themed-button p-3 rounded-lg font-bold mt-8">ذخیره تغییرات</button>
                    </main>
                </div>
            );
        };
        
        const EngineeringToolsModal = ({ onCancel }) => {
            const [activeTab, setActiveTab] = useState('lab');
            const [concreteTest, setConcreteTest] = useState({ fc: '25', s1: '', s2: '', s3: '', result: null });
            const [superelevation, setSuperelevation] = useState({ v: '', r: '', f: '0.14', result: '' });
            const [beam, setBeam] = useState({ l: '', w: '', moment: '', shear: '' });
            const [concreteConversion, setConcreteConversion] = useState({ cube7: '', result: '' });

            const analyzeConcreteTest = () => {
                const fc = parseFloat(concreteTest.fc);
                const samples = [parseFloat(concreteTest.s1), parseFloat(concreteTest.s2), parseFloat(concreteTest.s3)].filter(s => !isNaN(s));
                if (samples.length !== 3) {
                    setConcreteTest(c => ({...c, result: {ok: false, reason: "لطفا مقاومت هر سه نمونه را وارد کنید."}}));
                    return;
                }
                const avg = samples.reduce((a, b) => a + b, 0) / 3;
                const minSample = Math.min(...samples);
                let isOk = avg >= fc + 0.82 * 3.5 && minSample >= fc - 3.5;
                let reason = isOk ? "میانگین مقاومت و مقاومت حداقل نمونه‌ها در محدوده قابل قبول است." : (avg < fc + 0.82 * 3.5 ? "میانگین مقاومت نمونه‌ها از حد مطلوب کمتر است." : "مقاومت یکی از نمونه‌ها به طور قابل توجهی پایین است.");
                setConcreteTest(c => ({...c, result: {ok: isOk, reason: reason}}));
            };
            const calcSuperelevation = () => {
                const { v, r, f } = superelevation;
                if (v > 0 && r > 0 && f > 0) setSuperelevation(s => ({ ...s, result: (((v * v) / (127 * r)) - f).toFixed(4) }));
            };
            const calcBeam = () => {
                const { l, w } = beam;
                if (l > 0 && w > 0) setBeam(b => ({ ...b, moment: ((w * l * l) / 8).toFixed(2), shear: ((w * l) / 2).toFixed(2) }));
            };
            const convertConcreteStrength = () => {
                const cube7 = parseFloat(concreteConversion.cube7);
                if (cube7 > 0) {
                    const cyl28 = (cube7 * 1.2).toFixed(2);
                    setConcreteConversion(c => ({ ...c, result: cyl28 }));
                }
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content themed-modal-content overflow-y-auto">
                        <h2 className="text-xl font-bold mb-4">ابزارهای مهندسی</h2>
                        <div className="border-b border-gray-200 dark:border-gray-700">
                            <nav className="-mb-px flex space-x-2 space-x-reverse text-sm font-medium overflow-x-auto">
                                <button onClick={() => setActiveTab('lab')} className={`whitespace-nowrap py-2 px-1 border-b-2 ${activeTab === 'lab' ? 'border-blue-500 text-blue-600' : 'border-transparent hover:border-gray-300'}`}>تحلیل آزمایشگاه</button>
                                <button onClick={() => setActiveTab('concreteConversion')} className={`whitespace-nowrap py-2 px-1 border-b-2 ${activeTab === 'concreteConversion' ? 'border-blue-500 text-blue-600' : 'border-transparent hover:border-gray-300'}`}>تبدیل مقاومت بتن</button>
                                <button onClick={() => setActiveTab('superelevation')} className={`whitespace-nowrap py-2 px-1 border-b-2 ${activeTab === 'superelevation' ? 'border-blue-500 text-blue-600' : 'border-transparent hover:border-gray-300'}`}>بربلندی راه</button>
                                <button onClick={() => setActiveTab('beam')} className={`whitespace-nowrap py-2 px-1 border-b-2 ${activeTab === 'beam' ? 'border-blue-500 text-blue-600' : 'border-transparent hover:border-gray-300'}`}>تحلیل تیر ساده</button>
                            </nav>
                        </div>
                        <div className="pt-4 space-y-4">
                            <p className="text-xs text-yellow-600 dark:text-yellow-400 bg-yellow-50 dark:bg-yellow-900/50 p-2 rounded-md">توجه: این ابزارها فقط برای تخمین اولیه هستند و جایگزین محاسبات دقیق مهندسی نمی‌شوند.</p>
                            {activeTab === 'lab' && (
                                <div className="space-y-2">
                                    <h3 className="font-bold">آزمایش مقاومت فشاری بتن</h3>
                                    <select value={concreteTest.fc} onChange={e => setConcreteTest(c => ({...c, fc: e.target.value}))} className="w-full p-2 border rounded bg-transparent">
                                        <option value="20">C20 (20 MPa)</option><option value="25">C25 (25 MPa)</option><option value="30">C30 (30 MPa)</option>
                                    </select>
                                    <div className="grid grid-cols-3 gap-2">
                                        <input type="number" value={concreteTest.s1} onChange={e => setConcreteTest(c => ({...c, s1: e.target.value}))} placeholder="نمونه ۱ (MPa)" className="w-full p-2 border rounded bg-transparent" />
                                        <input type="number" value={concreteTest.s2} onChange={e => setConcreteTest(c => ({...c, s2: e.target.value}))} placeholder="نمونه ۲ (MPa)" className="w-full p-2 border rounded bg-transparent" />
                                        <input type="number" value={concreteTest.s3} onChange={e => setConcreteTest(c => ({...c, s3: e.target.value}))} placeholder="نمونه ۳ (MPa)" className="w-full p-2 border rounded bg-transparent" />
                                    </div>
                                    <button onClick={analyzeConcreteTest} className="w-full themed-button p-2 rounded">تحلیل نتایج</button>
                                    {concreteTest.result && (
                                        <div className={`text-center font-bold p-3 rounded-md ${concreteTest.result.ok ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                            <p>{concreteTest.result.ok ? '✅ نتایج قابل قبول است' : '❌ نتایج قابل قبول نیست'}</p>
                                            <p className="text-sm font-normal mt-1">{concreteTest.result.reason}</p>
                                        </div>
                                    )}
                                </div>
                            )}
                            {activeTab === 'concreteConversion' && (
                                <div className="space-y-2">
                                    <h3 className="font-bold">تبدیل مقاومت نمونه مکعبی ۷ روزه به استوانه‌ای ۲۸ روزه</h3>
                                    <input 
                                        type="number" 
                                        value={concreteConversion.cube7} 
                                        onChange={e => setConcreteConversion(c => ({...c, cube7: e.target.value}))} 
                                        placeholder="مقاومت مکعبی ۷ روزه (kg/cm²)" 
                                        className="w-full p-2 border rounded bg-transparent" 
                                    />
                                    <button onClick={convertConcreteStrength} className="w-full themed-button p-2 rounded">تبدیل</button>
                                    {concreteConversion.result && 
                                        <p className="text-center font-bold pt-2">
                                            مقاومت استوانه‌ای ۲۸ روزه تخمینی: {concreteConversion.result} kg/cm²
                                        </p>
                                    }
                                </div>
                            )}
                            {activeTab === 'superelevation' && (
                                <div className="space-y-2">
                                     <h3 className="font-bold">محاسبه بربلندی (Superelevation)</h3>
                                    <input type="number" value={superelevation.v} onChange={e => setSuperelevation(s => ({...s, v: e.target.value}))} placeholder="سرعت طرح (km/h)" className="w-full p-2 border rounded bg-transparent" />
                                    <input type="number" value={superelevation.r} onChange={e => setSuperelevation(s => ({...s, r: e.target.value}))} placeholder="شعاع قوس (متر)" className="w-full p-2 border rounded bg-transparent" />
                                    <input type="number" step="0.01" value={superelevation.f} onChange={e => setSuperelevation(s => ({...s, f: e.target.value}))} placeholder="ضریب اصطکاک جانبی (معمولا ۰.۱۴)" className="w-full p-2 border rounded bg-transparent" />
                                    <button onClick={calcSuperelevation} className="w-full themed-button p-2 rounded">محاسبه</button>
                                    {superelevation.result && <p className="text-center font-bold">بربلندی مورد نیاز: {superelevation.result} ({ (superelevation.result * 100).toFixed(2) } درصد)</p>}
                                </div>
                            )}
                             {activeTab === 'beam' && (
                                <div className="space-y-2">
                                    <h3 className="font-bold">تحلیل تیر ساده با بار گسترده</h3>
                                    <input type="number" value={beam.l} onChange={e => setBeam(b => ({...b, l: e.target.value}))} placeholder="طول دهانه (متر)" className="w-full p-2 border rounded bg-transparent" />
                                    <input type="number" value={beam.w} onChange={e => setBeam(b => ({...b, w: e.target.value}))} placeholder="بار گسترده (kg/m)" className="w-full p-2 border rounded bg-transparent" />
                                    <button onClick={calcBeam} className="w-full themed-button p-2 rounded">محاسبه</button>
                                    {beam.moment && <div className="text-center font-bold space-y-1 pt-2">
                                        <p>حداکثر لنگر خمشی: {beam.moment} kg.m</p>
                                        <p>حداکثر نیروی برشی: {beam.shear} kg</p>
                                    </div>}
                                </div>
                            )}
                        </div>
                        <div className="flex justify-end pt-4"><button type="button" onClick={onCancel} className="bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded">بستن</button></div>
                    </div>
                </div>
            );
        };
        
        const ReportModal = ({ report, project, userProfile, onSave, onCancel }) => {
            const initialWeather = { temp: '', feels_like: '', humidity: '' };
            const [formData, setFormData] = useState(report || { id: Date.now(), date: new Date().toLocaleDateString('fa-IR'), weather: initialWeather, text: '', photos: [] });
            const [bulletPoints, setBulletPoints] = useState('');
            const [isGeneratingText, setIsGeneratingText] = useState(false);
            const [isAnalyzingPhoto, setIsAnalyzingPhoto] = useState(null);
            const [isGeneratingReceipt, setIsGeneratingReceipt] = useState(false);
            const photoInputRef = useRef(null);
            
            const handleWeatherChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({
                    ...prev,
                    weather: {
                        ...prev.weather,
                        [name]: value
                    }
                }));
            };

            const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            
            const handlePhotoDescriptionChange = (photoId, newDescription) => {
                setFormData(prev => ({
                    ...prev,
                    photos: prev.photos.map(p => p.id === photoId ? { ...p, description: newDescription } : p)
                }));
            };

            const handlePhotoUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const newPhoto = {
                            id: Date.now() + Math.random(),
                            src: reader.result,
                            description: ''
                        };
                        setFormData(prev => ({...prev, photos: [...prev.photos, newPhoto]}));
                    };
                    reader.readAsDataURL(file);
                });
            };

            const generateReportFromBullets = async () => {
                if (!bulletPoints.trim()) return;
                setIsGeneratingText(true);
                try {
                    const prompt = `شما یک مهندس ناظر باتجربه هستید. نکات کلیدی زیر از بازدید امروز از یک پروژه ساختمانی است. لطفاً این نکات را به یک پاراگراف گزارش رسمی و کامل تبدیل کنید. لحن گزارش باید حرفه‌ای و فنی باشد.\n\nنکات:\n${bulletPoints}`;
                    const payload = { contents: [{ parts: [{ text: prompt }] }] };
                    const result = await callGeminiAPI(payload);
                    setFormData(prev => ({ ...prev, text: (prev.text ? prev.text + '\n\n' : '') + result }));
                    setBulletPoints('');
                } catch (error) {
                    console.error("Error generating report text:", error);
                    alert("خطا در تولید متن گزارش.");
                } finally {
                    setIsGeneratingText(false);
                }
            };

            const analyzePhoto = async (photo, index) => {
                setIsAnalyzingPhoto(index);
                try {
                    const prompt = "شما یک مهندس ناظر عمران هستید. این تصویر از یک کارگاه ساختمانی است. لطفاً شرحی فنی و مختصر از آنچه در تصویر مشاهده می‌شود ارائه دهید. به نکات ایمنی، پیشرفت کار یا مشکلات کیفی احتمالی اشاره کنید.";
                    const base64ImageData = photo.src.split(',')[1];
                    const payload = { contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: 'image/jpeg', data: base64ImageData } }] }] };
                    const result = await callGeminiAPI(payload);
                    handlePhotoDescriptionChange(photo.id, result);
                } catch (error) {
                    console.error("Error analyzing photo:", error);
                    alert("خطا در تحلیل تصویر.");
                } finally {
                    setIsAnalyzingPhoto(null);
                }
            };
            
            const generateReceiptImage = async () => {
                setIsGeneratingReceipt(true);
                const renderElement = document.getElementById('pdf-render-area');
                
                const weatherHtml = `
                    <div style="display: flex; justify-content: space-around; margin-bottom: 15px; font-size: 14px; background-color: #f8f9fa; padding: 10px; border-radius: 6px;">
                        <span><strong>دما:</strong> ${formData.weather.temp || 'N/A'}°C</span>
                        <span><strong>دمای محسوس:</strong> ${formData.weather.feels_like || 'N/A'}°C</span>
                        <span><strong>رطوبت:</strong> ${formData.weather.humidity || 'N/A'}%</span>
                    </div>`;

                const photosHtml = formData.photos.length > 0 ? `
                    <div style="margin-top: 15px;">
                        <h3 style="font-size: 16px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px;">پیوست تصاویر</h3>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;">
                            ${formData.photos.map((p, index) => `
                                <div style="position: relative; width: 120px; height: 120px;">
                                    <img src="${p.src}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px;" />
                                    <span style="position: absolute; top: 5px; right: 5px; background-color: rgba(0,0,0,0.7); color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border: 1px solid rgba(255,255,255,0.5);">${index + 1}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div style="font-size: 12px; color: #333;">
                            ${formData.photos.map((p, index) => p.description ? `<p style="margin-bottom: 8px; padding-right: 10px; border-right: 2px solid #ccc;"><strong>تصویر ${index + 1}:</strong> ${p.description.replace(/\n/g, '<br/>')}</p>` : '').join('')}
                        </div>
                    </div>
                ` : '';
                
                const footerHtml = userProfile.showPdfFooter ? `
                    <div style="text-align: center; font-size: 10px; color: #888; margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee;">
                        <p>این گزارش توسط اپلیکیشن همراه ناظر تهیه شده است.</p>
                    </div>
                ` : '';

                const receiptContent = `
                    <div style="border: 1px solid #ccc; padding: 20px; font-size: 14px; color: black;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 10px;">
                            <div>
                                <h1 style="font-size: 22px; font-weight: bold; margin: 0;">${userProfile.pdfHeaderTitle || 'گزارش بازدید از پروژه'}</h1>
                                <p style="margin: 5px 0;"><strong>پروژه:</strong> ${project.name}</p>
                                <p style="margin: 5px 0;"><strong>آدرس:</strong> ${project.address}</p>
                            </div>
                            ${userProfile.companyLogo ? `<img src="${userProfile.companyLogo}" style="max-height: 70px; max-width: 120px;" />` : ''}
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <div><p><strong>ناظر:</strong> ${userProfile.name}</p><p><strong>شرکت:</strong> ${userProfile.companyName || ''}</p></div>
                            <div><p><strong>شماره نظام مهندسی:</strong> ${userProfile.engId}</p><p><strong>تماس:</strong> ${userProfile.contactNumber || ''}</p></div>
                            <p><strong>تاریخ:</strong> ${formData.date}</p>
                        </div>
                        ${weatherHtml}
                        <div style="margin-top: 15px;">
                            <h3 style="font-size: 16px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px;">شرح گزارش</h3>
                            <p style="line-height: 1.7; white-space: pre-wrap;">${formData.text.replace(/\n/g, '<br/>')}</p>
                        </div>
                        ${photosHtml}
                        <div style="margin-top: 40px;">
                            <div style="display: flex; justify-content: flex-end; align-items: center;">
                                <p style="margin: 0 10px 0 0;"><strong>امضای ناظر</strong></p>
                                ${userProfile.signature ? `<img src="${userProfile.signature}" style="max-height: 60px; max-width: 150px;" />` : ''}
                            </div>
                            ${footerHtml}
                        </div>
                    </div>
                `;
                renderElement.innerHTML = receiptContent;

                try {
                    const canvas = await html2canvas(renderElement, { scale: 3, useCORS: true });
                    const imageURL = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.href = imageURL;
                    link.download = `receipt-${project.name}-${formData.date}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    console.error("Error generating image receipt:", error);
                    alert("خطا در تولید رسید عکس.");
                } finally {
                    renderElement.innerHTML = '';
                    setIsGeneratingReceipt(false);
                }
            };

            return (
                <div className="modal-overlay">
                    <div className="modal-content themed-modal-content">
                        <div className="overflow-y-auto space-y-4 p-1">
                            <h2 className="text-xl font-bold mb-2">گزارش روزانه</h2>
                            <input type="text" name="date" value={formData.date} onChange={handleChange} placeholder="تاریخ" className="w-full p-2 border rounded bg-transparent" />
                            
                            <div className="themed-card p-3 rounded-lg border">
                                <h3 className="font-bold mb-2">وضعیت جوی (ورود دستی)</h3>
                                <div className="grid grid-cols-3 gap-2 text-sm">
                                    <input 
                                        type="number" 
                                        name="temp" 
                                        value={formData.weather.temp} 
                                        onChange={handleWeatherChange} 
                                        placeholder="دما (°C)" 
                                        className="w-full p-2 border rounded bg-transparent text-center" 
                                    />
                                    <input 
                                        type="number" 
                                        name="feels_like" 
                                        value={formData.weather.feels_like} 
                                        onChange={handleWeatherChange} 
                                        placeholder="دمای محسوس" 
                                        className="w-full p-2 border rounded bg-transparent text-center" 
                                    />
                                    <input 
                                        type="number" 
                                        name="humidity" 
                                        value={formData.weather.humidity} 
                                        onChange={handleWeatherChange} 
                                        placeholder="رطوبت (%)" 
                                        className="w-full p-2 border rounded bg-transparent text-center" 
                                    />
                                </div>
                            </div>
                            
                            <div className="themed-card p-3 rounded-lg border border-teal-500/30">
                                <h3 className="font-bold mb-2 text-teal-600 dark:text-teal-400">✨ دستیار هوشمند گزارش</h3>
                                <textarea value={bulletPoints} onChange={(e) => setBulletPoints(e.target.value)} placeholder="نکات کلیدی را اینجا وارد کنید (هر نکته در یک خط)..." className="w-full p-2 border rounded h-24 bg-transparent mb-2"></textarea>
                                <button onClick={generateReportFromBullets} disabled={isGeneratingText} className="w-full bg-teal-500 text-white p-2 rounded font-bold flex items-center justify-center">
                                    {isGeneratingText ? <div className="loader h-5 w-5 border-2 rounded-full"></div> : 'تولید متن گزارش'}
                                </button>
                            </div>

                            <textarea name="text" value={formData.text} onChange={handleChange} placeholder="شرح فعالیت‌ها، دستورکارها و..." className="w-full p-2 border rounded h-32 bg-transparent"></textarea>
                            
                            <div>
                                <h3 className="font-bold mb-2">تصاویر</h3>
                                <div className="space-y-4">
                                    {formData.photos.map((photo, index) => (
                                        <div key={photo.id} className="themed-card border p-2 rounded-lg">
                                            <img src={photo.src} className="w-full h-auto object-cover rounded mb-2" />
                                            <textarea 
                                                value={photo.description}
                                                onChange={(e) => handlePhotoDescriptionChange(photo.id, e.target.value)}
                                                placeholder="توضیحات عکس..."
                                                className="w-full p-2 text-sm border rounded bg-transparent h-16"
                                            ></textarea>
                                            <button 
                                                onClick={() => analyzePhoto(photo, index)} 
                                                disabled={isAnalyzingPhoto === index}
                                                className="w-full mt-1 bg-sky-500 text-white text-xs py-1 rounded flex items-center justify-center"
                                                title="تحلیل هوشمند تصویر">
                                                {isAnalyzingPhoto === index ? <div className="loader h-4 w-4 border-2 rounded-full"></div> : '✨ تحلیل و افزودن توضیحات'}
                                            </button>
                                        </div>
                                    ))}
                                    <button onClick={() => photoInputRef.current.click()} className="w-full h-24 bg-gray-200 dark:bg-gray-700 rounded flex items-center justify-center border-2 border-dashed">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    </button>
                                    <input type="file" ref={photoInputRef} multiple accept="image/*" onChange={handlePhotoUpload} />
                                </div>
                            </div>
                        </div>
                        <div className="flex justify-between items-center space-x-2 space-x-reverse pt-4 mt-auto">
                            <button onClick={generateReceiptImage} disabled={isGeneratingReceipt} className="bg-green-600 text-white px-4 py-2 rounded flex items-center justify-center">
                                {isGeneratingReceipt ? <div className="loader h-5 w-5 border-2 rounded-full"></div> : 'ایجاد رسید عکس'}
                            </button>
                            <div className="flex space-x-2 space-x-reverse">
                                <button onClick={onCancel} className="bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded">انصراف</button>
                                <button onClick={() => onSave(formData)} className="themed-button px-4 py-2 rounded">ذخیره</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProjectDetailScreen = ({ project, onBack, userProfile, allReports, setAllReports }) => {
            const [activeTab, setActiveTab] = useState('reports');
            const [problemDescription, setProblemDescription] = useState('');
            const [solution, setSolution] = useState('');
            const [isLoadingSolution, setIsLoadingSolution] = useState(false);
            const [solutionError, setSolutionError] = useState(null);
            
            const [isReportModalOpen, setIsReportModalOpen] = useState(false);
            const [currentReport, setCurrentReport] = useState(null);
            
            const projectReports = allReports[project.id] || [];

            const setProjectReports = (newReports) => {
                setAllReports(prev => ({...prev, [project.id]: newReports }));
            };

            const handleSaveReport = (reportData) => {
                const existing = projectReports.find(r => r.id === reportData.id);
                let updatedReports;
                if (existing) {
                    updatedReports = projectReports.map(r => r.id === reportData.id ? reportData : r);
                } else {
                    updatedReports = [...projectReports, reportData];
                }
                setProjectReports(updatedReports);
                setIsReportModalOpen(false);
                setCurrentReport(null);
            };
            
            const handleOpenReport = (report) => {
                setCurrentReport(report);
                setIsReportModalOpen(true);
            };

            const handleDeleteReport = (reportId) => {
                if(!window.confirm('آیا از حذف این گزارش مطمئن هستید؟')) { return; }
                setProjectReports(projectReports.filter(r => r.id !== reportId));
            }

            const getSolution = async () => {
                 if (!problemDescription.trim()) {
                    setSolutionError("لطفا ابتدا شرح مشکل فنی را وارد کنید.");
                    return;
                }
                setIsLoadingSolution(true);
                setSolutionError(null);
                setSolution('');
                try {
                    const prompt = `شما یک مهندس مشاور ارشد عمران هستید. یک مهندس ناظر در پروژه "${project.name}" با مشکل فنی زیر مواجه شده است. لطفاً یک تحلیل و راه‌حل جامع ارائه دهید. پاسخ شما باید شامل بخش‌های "## دلایل احتمالی"، "## اقدامات فوری و تست‌های پیشنهادی" و "## راه‌حل‌های بلندمدت" باشد. از تیترهای markdown با ## استفاده کنید.\n\nشرح مشکل:\n${problemDescription}`;
                    const payload = { contents: [{ parts: [{ text: prompt }] }] };
                    const result = await callGeminiAPI(payload);
                    setSolution(result);
                } catch (e) {
                    console.error(e);
                    setSolutionError('خطا در دریافت راه‌حل. لطفا دوباره تلاش کنید.');
                } finally {
                    setIsLoadingSolution(false);
                }
            };
            
            return (
                <div className="flex flex-col h-screen">
                    <header className="themed-header flex justify-between items-center p-4 border-b">
                        <button onClick={onBack} className="p-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
                        <h1 className="text-xl font-bold truncate">{project.name}</h1>
                        <div style={{width: 24}}></div>
                    </header>
                    <div className="border-b border-gray-200 dark:border-gray-700">
                        <nav className="-mb-px flex space-x-4 space-x-reverse justify-center text-sm font-medium">
                            <button onClick={() => setActiveTab('reports')} className={`whitespace-nowrap py-3 px-2 border-b-2 ${activeTab === 'reports' ? 'border-blue-500 text-blue-600' : 'border-transparent hover:border-gray-300'}`}>گزارش‌ها</button>
                            <button onClick={() => setActiveTab('ai_consultant')} className={`whitespace-nowrap py-3 px-2 border-b-2 ${activeTab === 'ai_consultant' ? 'border-blue-500 text-blue-600' : 'border-transparent hover:border-gray-300'}`}>مشاور هوشمند</button>
                        </nav>
                    </div>
                    <main className="p-4 overflow-y-auto space-y-4 flex-grow">
                        {activeTab === 'reports' && (
                            <section>
                                <button onClick={() => handleOpenReport(null)} className="w-full themed-button p-3 rounded-lg font-bold flex items-center justify-center mb-4">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="ml-2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                                    ایجاد گزارش جدید
                                </button>
                                <h3 className="font-bold mb-2">گزارش‌های ثبت شده</h3>
                                {projectReports.length === 0 ? <p className="text-center opacity-60 mt-8">هنوز گزارشی برای این پروژه ثبت نشده است.</p> :
                                [...projectReports].sort((a, b) => new Date(b.date.replace(/(\d+)\/(\d+)\/(\d+)/, '$3-$2-$1')) - new Date(a.date.replace(/(\d+)\/(\d+)\/(\d+)/, '$3-$2-$1'))).map(report => (
                                    <div key={report.id} className="themed-card p-3 mb-2 rounded-lg flex justify-between items-center">
                                        <div onClick={() => handleOpenReport(report)} className="cursor-pointer flex-grow">
                                            <p className="font-bold">{report.date}</p>
                                            <p className="text-sm opacity-70 truncate">{report.text || "بدون شرح"}</p>
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); handleDeleteReport(report.id); }} className="p-2 opacity-50 hover:opacity-100 text-red-500"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                                    </div>
                                ))}
                            </section>
                        )}
                        {activeTab === 'ai_consultant' && (
                            <section className="themed-card p-4 rounded-lg shadow-sm border border-l-4 border-orange-500">
                                <h2 className="text-lg font-bold mb-3">مشاور هوشمند آیین‌نامه</h2>
                                <textarea value={problemDescription} onChange={(e) => setProblemDescription(e.target.value)} placeholder="سوال فنی یا آیین‌نامه‌ای خود را اینجا بنویسید..." className="w-full p-2 border rounded h-28 mb-3 bg-transparent"></textarea>
                                <button onClick={getSolution} disabled={isLoadingSolution} className="w-full bg-orange-500 text-white p-3 rounded-lg font-bold flex items-center justify-center">
                                    <span className="ml-2">✨ دریافت پاسخ فنی</span>
                                    {isLoadingSolution && <div className="loader h-5 w-5 border-2 rounded-full"></div>}
                                </button>
                                {solutionError && <p className="text-red-500 mt-4 text-center">{solutionError}</p>}
                                {solution && (
                                    <div className="mt-4 p-3 bg-orange-50 dark:bg-gray-800 rounded-lg border border-orange-200 dark:border-orange-800">
                                        <h3 className="text-base font-bold mb-2">پاسخ مشاور هوشمند:</h3>
                                        <div className="whitespace-pre-wrap text-sm leading-relaxed" dangerouslySetInnerHTML={{ __html: solution.replace(/## (.*)/g, '<strong class="block mt-3 mb-1">$1</strong>').replace(/\n/g, '<br/>') }}></div>
                                    </div>
                                )}
                            </section>
                        )}
                    </main>
                    {isReportModalOpen && <ReportModal report={currentReport} project={project} userProfile={userProfile} onSave={handleSaveReport} onCancel={() => setIsReportModalOpen(false)} />}
                </div>
            );
        };


        const App = () => {
            const [projects, setProjects] = useLocalStorage('projects', initialProjects);
            const [profile, setProfile] = useLocalStorage('profile', initialProfile);
            const [allReports, setAllReports] = useLocalStorage('allReports', initialReports);
            const [theme, setTheme] = useLocalStorage('theme', 'light');
            const [currentScreen, setCurrentScreen] = useState('projectList');
            const [selectedProject, setSelectedProject] = useState(null);
            const [editingProject, setEditingProject] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [showDataMenu, setShowDataMenu] = useState(false);
            const [showTools, setShowTools] = useState(false);
            const fileInputRef = useRef(null);
            
            useEffect(() => {
                const html = document.documentElement;
                html.classList.remove('light', 'paper', 'blueprint');
                html.classList.add(theme);
            }, [theme]);

            useEffect(() => {
                const root = document.documentElement;
                root.style.setProperty('--primary', profile.accentColor || '#2563eb');
                const hoverColor = profile.accentColor === '#2563eb' ? '#1d4ed8' : 
                                   profile.accentColor === '#16a34a' ? '#15803d' :
                                   profile.accentColor === '#f97316' ? '#ea580c' :
                                   '#7e22ce';
                root.style.setProperty('--primary-hover', hoverColor);
            }, [profile.accentColor]);


            const handleSelectProject = (project) => { setSelectedProject(project); setCurrentScreen('projectDetail'); };
            const handleSaveProject = (projectData) => {
                if (projectData.id) { 
                    setProjects(prev => prev.map(p => p.id === projectData.id ? projectData : p)); 
                } else { 
                    const newProject = { ...projectData, id: Date.now() };
                    setProjects(prev => [...prev, newProject]); 
                    setAllReports(prev => ({...prev, [newProject.id]: []}));
                }
                setIsModalOpen(false); setEditingProject(null);
            };
            const handleDeleteProject = (projectId) => {
                if (window.confirm('آیا از حذف این پروژه و تمام گزارش‌های آن مطمئن هستید؟')) { 
                    setProjects(prev => prev.filter(p => p.id !== projectId));
                    setAllReports(prev => {
                        const newReports = {...prev};
                        delete newReports[projectId];
                        return newReports;
                    });
                }
            };
            const handleAddNew = () => { setEditingProject(null); setIsModalOpen(true); };
            const handleEdit = (project) => { setEditingProject(project); setIsModalOpen(true); };
            
            const handleExport = () => {
                const dataToExport = { projects, profile, theme, allReports };
                const dataStr = JSON.stringify(dataToExport, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'hamrah-nazer-backup.json';
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                URL.revokeObjectURL(url); setShowDataMenu(false);
            };

            const handleImport = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const importedData = JSON.parse(e.target.result);
                            if (importedData.projects && importedData.profile && importedData.allReports) {
                                setProjects(importedData.projects);
                                setProfile(importedData.profile);
                                setAllReports(importedData.allReports);
                                if (importedData.theme) setTheme(importedData.theme);
                                alert('اطلاعات با موفقیت بازیابی شد.');
                            } else { alert('فایل پشتیبان معتبر نیست.'); }
                        } catch (err) { alert('خطا در خواندن فایل پشتیبان.'); }
                    };
                    reader.readAsText(file);
                }
                setShowDataMenu(false);
                fileInputRef.current.value = "";
            };

            const renderScreen = () => {
                const layoutClass = `layout-${profile.layoutDensity || 'comfortable'}`;
                switch (currentScreen) {
                    case 'projectDetail': return <ProjectDetailScreen project={selectedProject} onBack={() => setCurrentScreen('projectList')} userProfile={profile} allReports={allReports} setAllReports={setAllReports} />;
                    case 'profile': return <ProfileScreen profile={profile} setProfile={setProfile} onBack={() => setCurrentScreen('projectList')} theme={theme} setTheme={setTheme} />;
                    default: return (
                         <div className={`flex flex-col h-full ${layoutClass}`}>
                            <header className="themed-header flex justify-between items-center p-4 border-b">
                                <button onClick={() => setCurrentScreen('profile')} className="p-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
                                <button onClick={() => setShowTools(true)} className="p-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18M3 10h18M5 10v11M19 10v11M8 21v-9M12 21v-9M16 21v-9M2 10l10-7 10 7"/></svg></button>
                                <div className="relative">
                                    <button onClick={() => setShowDataMenu(prev => !prev)} className="p-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
                                    {showDataMenu && (
                                        <div className="absolute left-0 mt-2 w-48 bg-white themed-card rounded-md shadow-lg z-10">
                                            <a href="#" onClick={handleExport} className="block px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">ذخیره پشتیبان</a>
                                            <a href="#" onClick={() => fileInputRef.current.click()} className="block px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">بازیابی اطلاعات</a>
                                            <input type="file" ref={fileInputRef} onChange={handleImport} accept=".json" style={{display: 'none'}} />
                                        </div>
                                    )}
                                </div>
                            </header>
                            <main className="p-4 overflow-y-auto flex-grow">
                                {projects.map(p => <ProjectCard key={p.id} project={p} onSelect={handleSelectProject} onEdit={handleEdit} onDelete={handleDeleteProject} />)}
                                <footer className="text-center text-xs opacity-50 py-4">
                                    © 2025 - تمام حقوق این اپلیکیشن متعلق به مهندس ناظر محمد تاجداری است.
                                </footer>
                            </main>
                            <button onClick={handleAddNew} className="absolute bottom-6 left-6 themed-button w-16 h-16 rounded-full flex justify-center items-center shadow-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            </button>
                            {isModalOpen && <ProjectFormModal project={editingProject} onSave={handleSaveProject} onCancel={() => setIsModalOpen(false)} />}
                            {showTools && <EngineeringToolsModal onCancel={() => setShowTools(false)} />}
                        </div>
                    );
                }
            };
            return (<div className="h-full w-full">{renderScreen()}</div>);
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('ServiceWorker registration successful.'))
                    .catch(error => console.log('ServiceWorker registration failed: ', error));
            });
        }
    </script>
</body>
</html>
