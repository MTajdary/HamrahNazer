<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>گزارش‌ساز - همراه ناظر</title><link rel="stylesheet" href="/style.css"></head><body><header class="app-header"><img src="/icons/logo.svg" class="logo"><h1>گزارش‌ساز</h1></header><main class="container"><section class="view"><h2>گزارش‌ها</h2><div id="reports-list"></div></section></main><footer class="app-footer"><p>© 2025 - تمامی حقوق این اپلیکیشن متعلق به محمد تاجداری است.</p></footer><script src="/app.js"></script><script>async function render(){ const d=await window.__HN.db.get(); const el=document.getElementById('reports-list'); el.innerHTML=''; const items=d.sheets.concat(d.roadJobs); items.slice().reverse().forEach(it=>{ const div=document.createElement('div'); div.innerHTML=`<strong>${it.title||'گزارش'}</strong> <small>${new Date(it.date).toLocaleString()}</small> <button onclick="downloadReport('${it.id}')">دانلود</button>`; el.appendChild(div); }); } window.downloadReport=id=>{ const w=window.open('','_blank'); w.document.write('<html dir=rtl><head><meta charset=utf-8><title>گزارش</title></head><body style="font-family:Vazirmatn, sans-serif; padding:20px">'); window.__HN.db.get().then(d=>{ const itm=d.sheets.find(x=>x.id===id)||d.roadJobs.find(x=>x.id===id); if(!itm) return; w.document.write(`<h2>${itm.title||'گزارش'}</h2>`); if(itm.notes) w.document.write(`<p>${itm.notes}</p>`); if(itm.volume) w.document.write(`<p>حجم: ${itm.volume} m³</p>`); const opt = d.optReportTag!==false; if(opt) w.document.write('<hr><p style="text-align:center; color:#666">این گزارش با اپلیکیشن همراه ناظر تهیه شده است.</p>'); w.document.write('<footer><p style="text-align:center; color:#999; font-size:12px">© 2025 - تمامی حقوق این اپلیکیشن متعلق به محمد تاجداری است.</p></footer>'); w.document.write('</body></html>'); w.document.close(); w.print(); }); }; render();</script></body></html>
