<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>محاسبات راه - همراه ناظر</title><link rel="stylesheet" href="/style.css"></head><body><header class="app-header"><img src="/icons/logo.svg" class="logo"><h1>محاسبات راه</h1></header><main class="container"><section class="view"><h2>محاسبات ساده راه</h2><form id="road-form"><label>طول (m): <input id="road-length" type="number" step="0.01"></label><label>شیب متوسط (%): <input id="road-slope" type="number" step="0.01"></label><label>عمق متوسط (m): <input id="road-depth" type="number" step="0.01"></label><button type="button" id="calc-road">محاسبه</button></form><div id="road-result"></div></section></main><footer class="app-footer"><p>© 2025 - تمامی حقوق این اپلیکیشن متعلق به محمد تاجداری است.</p></footer><script src="/app.js"></script><script>document.getElementById('calc-road').addEventListener('click', async()=>{ const L=parseFloat(document.getElementById('road-length').value)||0; const slope=parseFloat(document.getElementById('road-slope').value)||0; const depth=parseFloat(document.getElementById('road-depth').value)||0; const width=6; const volume=L*width*depth; const data=await window.__HN.db.get(); const job={id:'rc_'+Date.now(),L,slope,depth,width,volume,date:Date.now(),synced:false}; data.roadJobs.push(job); await window.__HN.db.set(data); document.getElementById('road-result').innerHTML=`<p>حجم تقریبی: <strong>${volume.toFixed(3)} m³</strong></p>`; window.__HN.enqueueSync({type:'roadcalc', payload: job}); });</script></body></html>
