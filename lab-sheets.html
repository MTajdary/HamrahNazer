<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>شیت آزمایشگاهی - همراه ناظر</title><link rel="stylesheet" href="/style.css"></head><body><header class="app-header"><img src="/icons/logo.svg" class="logo"><h1>شیت آزمایشگاهی</h1></header><main class="container"><section class="view"><h2>ثبت شیت آزمایشگاهی</h2><form id="labsheet-form"><label>نوع آزمون<select id="lab-type"><option value="soil">خاک</option><option value="concrete">بتن</option><option value="asphalt">آسفالت</option><option value="steel">فولاد</option></select></label><label>عنوان: <input id="lab-title"></label><label>توضیحات: <textarea id="lab-notes"></textarea></label><label>فایل (اختیاری): <input id="lab-file" type="file" accept=".pdf,image/*"></label><button type="button" id="save-lab">ذخیره محلی</button></form><div id="labsheet-list"></div></section></main><footer class="app-footer"><p>© 2025 - تمامی حقوق این اپلیکیشن متعلق به محمد تاجداری است.</p></footer><script src="/app.js"></script><script>document.getElementById('save-lab').addEventListener('click', async()=>{ const type=document.getElementById('lab-type').value; const title=document.getElementById('lab-title').value; const notes=document.getElementById('lab-notes').value; const file=document.getElementById('lab-file').files[0]; let fileData=null; if(file){ fileData=await new Promise(r=>{ const fr=new FileReader(); fr.onload=()=>r(fr.result); fr.readAsDataURL(file); }); } const data=await window.__HN.db.get(); const item={id:'ls_'+Date.now(),type,title,notes,fileData,date:Date.now(),synced:false}; data.sheets.push(item); await window.__HN.db.set(data); alert('شیت ذخیره شد'); window.location='/pages/lab-sheets.html'; }); // render list on load (simple) (function(){ window.__HN.db.get().then(d=>{ const el=document.getElementById('labsheet-list'); el.innerHTML=''; d.sheets.slice().reverse().forEach(s=>{ const div=document.createElement('div'); div.innerHTML=`<strong>${s.title}</strong> <small>[${s.type}] ${new Date(s.date).toLocaleString()}</small><p>${s.notes||''}</p><button onclick="window.open()">${s.id}</button>`; el.appendChild(div); }); }); })();</script></body></html>
